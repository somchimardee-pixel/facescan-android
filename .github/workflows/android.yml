name: Build FaceScan APK

on:
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: chmod
      run: chmod +x gradlew

    - name: Build
  run: |
    chmod +x gradlew
    ./gradlew assembleDebug --stacktrace --no-daemon
  

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
